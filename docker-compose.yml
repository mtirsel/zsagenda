name: zsagenda
services:
  app:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file: .env
    restart: always
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - ./:/app
      - app_venv:/app/.venv
      - ${DATA_DIR:-./data}/database:/app/data/database
      - ${DATA_DIR:-./data}/static:/app/data/static
      - ${DATA_DIR:-./data}/media:/app/data/media
      - ${DATA_DIR:-./data}/logs:/app/data/logs

volumes:
  app_venv: